name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6  # Upgraded to v6 for native Node 24 execution

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        flake8 .
        echo "Linted all the python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6  # Upgraded to v6

    - name: Install Node.js
      uses: actions/setup-node@v6  # Upgraded to v6
      with:
        node-version: '20'

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        flake8 . --exclude=.venv,venv,env,node_modules,frontend/node_modules
        echo "Linted all the python files successfully"
